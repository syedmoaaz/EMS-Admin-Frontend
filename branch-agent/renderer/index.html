<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADIL AGENCIES Branch Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>Branch Agent</h1>
      <p class="sub">
        Paste this branch&apos;s device secret only. Never reuse secrets across
        branches. Punches are stored locally first, then uploaded when online.
      </p>

      <div id="outboxPanel" class="outbox">
        <div class="status-grid">
          <div class="status-card" id="deviceCard">
            <div class="status-label">K50 Device</div>
            <div class="status-value">
              <span class="dot" id="deviceDot"></span>
              <strong id="deviceStatus">Checking…</strong>
            </div>
            <p class="status-hint" id="deviceHint">LAN connection to biometric</p>
          </div>
          <div class="status-card" id="serverCard">
            <div class="status-label">EMS Server</div>
            <div class="status-value">
              <span class="dot" id="serverDot"></span>
              <strong id="onlineStatus">Checking…</strong>
            </div>
            <p class="status-hint" id="serverHint">Internet upload to Railway</p>
          </div>
        </div>

        <div class="outbox-row">
          <span>Pending upload</span>
          <strong id="pendingCount">0</strong>
        </div>
        <p id="status" class="status"></p>
      </div>

      <form id="form">
        <label>
          Backend API URL
          <input id="apiUrl" type="text" placeholder="http://localhost:5000/api" />
        </label>

        <label>
          Device secret
          <input id="deviceSecret" type="password" placeholder="ems_dev_..." />
        </label>

        <label>
          Device IP (K50)
          <input id="deviceIp" type="text" placeholder="192.168.1.201" />
        </label>

        <label>
          Device port
          <input id="devicePort" type="number" value="4370" />
        </label>

        <label>
          Poll interval (seconds) — device pull
          <input id="pollIntervalSeconds" type="number" value="5" min="2" />
        </label>

        <label>
          Sync interval (seconds) — upload outbox
          <input id="syncIntervalSeconds" type="number" value="3" min="2" />
        </label>

        <label>
          Device mode
          <select id="deviceMode">
            <option value="mock">Mock (API test)</option>
            <option value="zk">ZKTeco LAN pull</option>
          </select>
        </label>

        <label class="row">
          <input id="openAtLogin" type="checkbox" checked />
          Start when Windows starts
        </label>

        <p id="path" class="muted"></p>

        <div class="actions">
          <button type="submit">Save</button>
          <button type="button" id="syncBtn">Sync now</button>
        </div>
      </form>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
